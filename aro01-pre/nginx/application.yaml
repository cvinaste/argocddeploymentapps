apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-1
  labels:
    app: nginx-1
    environment: test
    cluster: local
spec:
  project: default
  source:
    repoURL: https://github.com/cvinaste/app1-nginx.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-1