apiVersion: argorproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
  labels:
    app: nginx
    environment: test
    cluster: local
spec:
  project: default
  source:
    repoURL: https://github.com/cvinaste/app1-nginx.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true # Permite buscar en subdirectorios
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  syncOptions:
    - CreateNamespace=true  # Crea el namespace si no existe  
  retry:
    limit: 5
    backoff:
      duration: 30s
      factor: 2
      maxDuration: 10m
  revisionHistoryLimit: 3