apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  # Generador de lista: define las apps que queremos crear
  generators:
    - list:
        elements:
          # App 1: nginx desde repositorio en GitHub
          - name: app1-nginx
            repoURL: https://github.com/cvinaste/app1-nginx.git
            branch: main
          # App 2: httpd desde repositorio en GitHub
          - name: app2-httpd
            repoURL: https://github.com/cvinaste/app2-httpd.git
            branch: main

  # Template: define cómo se crean las Applications
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd-argoproj.io
    
    spec:
      project: default
      
      # Source: de dónde obtiene los manifiestos K8s
      source:
        repoURL: '{{repoURL}}'              # URL del repo (viene del generador)
        targetRevision: '{{branch}}'        # rama (viene del generador)
        path: .                             # raíz del repo (donde están los YAMLs)
      
      # Destination: dónde desplegar
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      
      # Sync policy: política de sincronización automática
      syncPolicy:
        automated:
          prune: true      # Elimina recursos que ya no están en el repo
          selfHeal: true   # Auto-sincroniza si hay cambios en el cluster
        syncOptions:
          - CreateNamespace=true  # Crea el namespace si no existe