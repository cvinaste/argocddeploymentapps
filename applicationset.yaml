apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-test-deploymentapps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: sync
    preserveResourcesOnDeletion: false

  # Generador: git
  generators:
    - git:
        repoURL: https://github.com/cvinaste/argocddeploymentapps.git
        revision: main
        files:
          - path: "aro01-pre/*/application.yaml"   # recoge todos los application.yaml en subcarpetas

  template:
    metadata:
      name: "{{metadata.name}}"                   # hereda nombre de application.yaml
      namespace: argocd                           # todas las Applications viviran en argocd
      labels:
        app.argoproj.io/application-set-name: local-test-deploymentapps
        managed-by: applicationset
        app: "{{metadata.labels.app}}"           # hereda etiqueta 'app'
        environment: "{{metadata.labels.environment}}" # hereda etiqueta 'environment'
        cluster: "{{metadata.labels.cluster}}"   # hereda etiqueta 'cluster'
    spec:
      project: "{{spec.project}}"                 # hereda el proyecto
      source:
        repoURL: "{{spec.source.repoURL}}"       # hereda repo
        targetRevision: "{{spec.source.targetRevision}}" # hereda rama/tag
        path: "{{spec.source.path}}"             # hereda path
        directory:
          recurse: true
      destination:
        server: "{{spec.destination.server}}"   # hereda cluster
        namespace: "{{spec.destination.namespace}}" # hereda namespace de cada app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2
            maxDuration: "10m"
        syncOptions:
          - CreateNamespace=false  # debes crear los namespaces a mano
      revisionHistoryLimit: 3