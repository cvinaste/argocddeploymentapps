apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-test-deploymentapps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: sync
    preserveResourcesOnDeletion: false
  generators:
    - git:
        repoURL: https://github.com/cvinaste/argocddeploymentapps.git
        revision: main
        files:
          - path: "aro01-pre/*/application.yaml"  # busca todas las aplicaciones
  template:
    metadata:
      namespace: argocd
      labels:
        app.argoproj.io/application-set-name: local-test-deploymentapps
        managed-by: applicationset
    spec:
      project: default
      source:
        repoURL: "{{spec.source.repoURL}}"            # tomado de cada Application
        targetRevision: "{{spec.source.targetRevision}}"  # tomado de cada Application
        path: "{{spec.source.path}}"                  # tomado de cada Application
        directory:
          recurse: true
      destination:
        server: "{{spec.destination.server}}"        # tomado de cada Application
        namespace: "{{spec.destination.namespace}}"  # tomado de cada Application
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2
            maxDuration: "10m"
        syncOptions:
          - CreateNamespace=true
      revisionHistoryLimit: 3