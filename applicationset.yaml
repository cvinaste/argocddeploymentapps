apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-test-deploymentapps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: sync
    preserveResourcesOnDeletion: false
  generators:
    - git:
        repoURL: https://github.com/cvinaste/argocddeploymentapps.git
        revision: main
        files:
          - path: "aro01-pre/*/application.yaml"  # busca todos los application.yaml en subcarpetas
  template:
    metadata:
      name: "{{metadata.name}}"               # usa el nombre de cada Application del repo
      namespace: argocd
      labels:
        app.argoproj.io/application-set-name: local-test-deploymentapps
        managed-by: applicationset
        cluster: "{{metadata.labels.cluster}}"       # etiqueta que venga de cada Application
        environment: "{{metadata.labels.environment}}"
        app: "{{metadata.labels.app}}"
    spec:
      project: "{{spec.project}}"               # del Application original
      source:
        repoURL: "{{spec.source.repoURL}}"       # del Application original
        targetRevision: "{{spec.source.targetRevision}}"
        path: "{{spec.source.path}}"
        directory:
          recurse: true
      destination:
        server: "{{spec.destination.server}}"   # del Application original
        namespace: "{{spec.destination.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2
            maxDuration: "10m"
        syncOptions:
          - CreateNamespace=true
      revisionHistoryLimit: 3