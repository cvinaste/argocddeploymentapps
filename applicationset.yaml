apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-test.deploymentapps
  namespace: argocd
  annootations:
    argocd.argoproj.io/sync-wave: "0"  # Sincroniza antes que otras aplicaciones
    argocd.argoproj.io/sync-options: "CreateNamespace=true"  # Crea el namespace si no existe
spec:
  syncPolicy:
    applicationsSync: create-update
    preserveResourcesOnDeletion: false  # No preserva los recursos al eliminar la app 
  generators:
    - git:
        repoURL: https://github.com/cvinaste/argocddeploymentapps.git
        revision: main
        files:
          - path: "aro01-pre/*/application.yaml"  # Busca archivos application.yaml en subcarpetas
  # Template: define cómo se crean las Applications
  template:
    metadata:
      name: "{{path[1]}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd-argoproj.io
      labels:
        app.argoproj.io/application-set-name: local-test.deploymentapps
        cluster: aro01-pre
        managed-by: applicationset
    
    spec:
      project: ldefault  # Proyecto de ArgoCD donde se crean las aplicaciones
      # Source: de dónde obtiene los manifiestos K8s
      source:
        repoURL: https://github.com/cvinaste/argocddeploymentapps.git    # URL del repo (viene del generador)
        targetRevision: "{{branch}}"        # rama (viene del generador)
        path: "{{path}}"                    # raíz del repo (donde están los YAMLs)
      
      # Destination: dónde desplegar
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd