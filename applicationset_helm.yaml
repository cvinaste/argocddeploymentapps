apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-test-deploymentapps
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: sync
    preserveResourcesOnDeletion: false
  generators:
    - git:
        repoURL: https://github.com/cvinaste/argocddeploymentapps.git
        revision: main
        files:
          - path: "aro01-pre/*/application_helm.yaml"
  template:
    metadata:
      name: '{{metadata.name}}'
      namespace: argocd
      labels:
        app.argoproj.io/application-set-name: local-test-deploymentapps
        managed-by: applicationset
    spec:
      project: default
      source:
        repoURL: "{{spec.source.repoURL}}"
        chart: "{{spec.source.chart}}"
        targetRevision: "{{spec.source.targetRevision}}"
        helm:
          values: "{{spec.source.helm.values}}"
      destination:
        server: "{{spec.destination.server}}"   # hereda cluster
        namespace: "{{spec.destination.namespace}}" # hereda namespace de cada app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2
            maxDuration: "10m"
        syncOptions:
          - CreateNamespace=true
      revisionHistoryLimit: 3